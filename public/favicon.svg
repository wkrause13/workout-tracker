<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#4b5563"/>
    </linearGradient>
    <linearGradient id="weight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Center bar -->
  <rect x="4" y="14" width="24" height="4" rx="1" fill="url(#bar)"/>
  <!-- Left weight plates -->
  <rect x="2" y="8" width="4" height="16" rx="1" fill="url(#weight)"/>
  <rect x="6" y="10" width="3" height="12" rx="0.5" fill="url(#weight)"/>
  <!-- Right weight plates -->
  <rect x="26" y="8" width="4" height="16" rx="1" fill="url(#weight)"/>
  <rect x="23" y="10" width="3" height="12" rx="0.5" fill="url(#weight)"/>
</svg>